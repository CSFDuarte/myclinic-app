name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite disparar manualmente

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/CSFDuarte/myclinic-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Instructions
        run: |
          echo "✅ Images built and pushed to GHCR!"
          echo ""
          echo "To deploy on VPS, run:"
          echo "  cd /data/.openclaw/workspace/myclinic-app"
          echo "  docker compose -f docker-compose.ghcr.yml pull"
          echo "  docker compose -f docker-compose.ghcr.yml up -d --force-recreate"
          echo ""
          echo "Or use the webhook:"
          echo "  curl -X POST http://127.0.0.1:8765/webhook/deploy -H 'Content-Type: application/json' -d '{\"action\": \"deploy\"}'"
