version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: myclinic-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: myclinic123
      MONGO_INITDB_DATABASE: myclinic
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    networks:
      - myclinic-network

  # NestJS Backend API
  backend:
    image: ghcr.io/CSFDuarte/myclinic-app-backend:latest
    container_name: myclinic-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:myclinic123@mongodb:27017/myclinic?authSource=admin
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - myclinic-network

  # Next.js Frontend
  frontend:
    image: ghcr.io/CSFDuarte/myclinic-app-frontend:latest
    container_name: myclinic-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "8080:3000"
    depends_on:
      - backend
    networks:
      - myclinic-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  myclinic-network:
    driver: bridge
